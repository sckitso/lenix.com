<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Redirecting…</title>
  <style>
    body {
      background: #101010;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    a { color: #4fc3f7; }
  </style>
</head>
<body>
  <div>
    <p>Redirecting back to Lenix…</p>
    <p><a id="fallback" href="#">Tap here if nothing happens</a></p>
  </div>
  <script>
    var target = "myapp://callback" + window.location.search;
    document.getElementById('fallback').href = target;
    window.location.replace(target);
  </script>
</body>
</html>
