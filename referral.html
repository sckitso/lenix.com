<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You're invited to Lenix</title>
<meta name="description" content="Your friend invited you to try Lenix.">
<meta name="apple-itunes-app" content="app-id=6753905127">
<meta property="og:title" content="You're invited to Lenix">
<meta property="og:description" content="Your friend invited you to try Lenix. Tap to install — they'll get credit automatically.">
<meta property="og:url" content="https://lenixapp.com/referral">
<link rel="canonical" href="https://lenixapp.com/referral">
<link rel="icon" type="image/jpeg" href="https://github.com/sckitso/no/blob/main/Gemini_Generated_Image_wawr3kwawr3kwawr%202.jpg?raw=true" sizes="32x32">
<link rel="apple-touch-icon" href="https://github.com/sckitso/no/blob/main/Gemini_Generated_Image_wawr3kwawr3kwawr%202.jpg?raw=true" sizes="180x180">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a1a;
    color: #e0e0e0;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1.5rem;
  }

  .card {
    max-width: 440px;
    width: 100%;
    background: #2d2d2d;
    border: 1px solid #404040;
    border-radius: 24px;
    padding: 2.5rem 2rem;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .app-icon {
    width: 110px;
    height: 110px;
    border-radius: 26px;
    margin: 0 auto 1.75rem;
    background-image: url('https://i.imgur.com/uHtxqKf.jpeg');
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
  }

  h1 {
    font-size: 2rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
    margin-bottom: 0.6rem;
    line-height: 1.15;
  }

  h1 + .cta { margin-top: 2rem; }

  .ref {
    display: none;
    margin-bottom: 2rem;
    word-break: break-all;
  }

  .cta {
    display: block;
    width: 100%;
    font-family: inherit;
    font-size: 1rem;
    font-weight: 600;
    padding: 1rem 2rem;
    background: #fff;
    color: #1a1a1a;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
    -webkit-tap-highlight-color: transparent;
  }

  .cta:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 40px rgba(0, 0, 0, 0.4);
  }

  .cta:active {
    transform: translateY(0);
  }

  .cta[disabled] {
    background: #34c759;
    color: #fff;
    cursor: default;
    transform: none;
  }

  .status {
    margin-top: 1rem;
    font-size: 0.85rem;
    color: #888;
    min-height: 1.2em;
  }

  .footer {
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: #666;
  }

  .footer a {
    color: #b0b0b0;
    text-decoration: none;
  }

  .footer a:hover { color: #fff; }
</style>
</head>
<body>
<main class="card">
  <div class="app-icon" aria-hidden="true"></div>
  <h1>You're invited to Lenix</h1>

  <button class="cta" id="cta">Get Lenix</button>
  <p class="status" id="status">&nbsp;</p>

  <p class="footer"><a href="https://lenixapp.com/">lenixapp.com</a></p>
</main>

<script>
  const APP_STORE_URL = "https://apps.apple.com/us/app/lenix/id6753905127";
  const PREFIX = "lenixref:";

  // Accept either /referral/USER_X (clean Netlify path)
  // or /referral.html?ref=USER_X (legacy query-string form).
  const params = new URLSearchParams(location.search);
  let ref = (params.get("ref") || "").trim();
  if (!ref) {
    const m = location.pathname.match(/^\/referral\/([^/]+)\/?$/);
    if (m) ref = decodeURIComponent(m[1]).trim();
  }

  const cta = document.getElementById("cta");
  const status = document.getElementById("status");

  cta.addEventListener("click", async () => {
    if (ref) {
      const token = PREFIX + ref;
      try {
        await navigator.clipboard.writeText(token);
      } catch (e) {
        try {
          const ta = document.createElement("textarea");
          ta.value = token;
          ta.style.position = "fixed";
          ta.style.opacity = "0";
          document.body.appendChild(ta);
          ta.select();
          document.execCommand("copy");
          document.body.removeChild(ta);
        } catch (_) {}
      }
    }
    status.textContent = "Opening the App Store…";
    cta.disabled = true;
    window.location.href = APP_STORE_URL;
  });
</script>
</body>
</html>
