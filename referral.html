<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>You're invited to Lenix</title>
<meta name="apple-itunes-app" content="app-id=6753905127">
<meta property="og:title" content="You're invited to Lenix">
<meta property="og:description" content="Tap to install — your invite gets credit automatically.">
<meta property="og:url" content="https://lenixapp.com/referral">
<link rel="canonical" href="https://lenixapp.com/referral">
<link rel="icon" type="image/jpeg" href="https://github.com/sckitso/no/blob/main/Gemini_Generated_Image_wawr3kwawr3kwawr%202.jpg?raw=true">
<link rel="apple-touch-icon" href="https://github.com/sckitso/no/blob/main/Gemini_Generated_Image_wawr3kwawr3kwawr%202.jpg?raw=true">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #1a1a1a; color: #e0e0e0; line-height: 1.6;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 2rem 1.5rem;
  }
  .card {
    max-width: 440px; width: 100%;
    background: #2d2d2d; border: 1px solid #404040;
    border-radius: 24px; padding: 2.5rem 2rem;
    text-align: center; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .app-icon {
    width: 110px; height: 110px; border-radius: 26px;
    margin: 0 auto 1.75rem;
    background-image: url('https://i.imgur.com/uHtxqKf.jpeg');
    background-size: contain; background-position: center; background-repeat: no-repeat;
    box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  }
  h1 { font-size: 2rem; font-weight: 800; letter-spacing: -0.03em; color: #fff; line-height: 1.15; }
  h1 + .cta { margin-top: 2rem; }
  .cta {
    display: block; width: 100%; font-family: inherit;
    font-size: 1rem; font-weight: 600; padding: 1rem 2rem;
    background: #fff; color: #1a1a1a; border: none;
    border-radius: 14px; cursor: pointer;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    transition: transform 0.3s, background 0.3s;
  }
  .cta:hover { transform: translateY(-2px); }
  .cta[disabled] { background: #34c759; color: #fff; cursor: default; transform: none; }
  .status { margin-top: 1rem; font-size: 0.85rem; color: #888; min-height: 1.2em; }

  .debug {
    margin-top: 1.5rem; background: rgba(0,0,0,0.25);
    border: 1px solid #404040; border-radius: 12px;
    padding: 0.9rem 1rem; text-align: left; font-size: 0.7rem; display: none;
    max-height: 380px; overflow-y: auto;
  }
  .debug.show { display: block; }
  .debug-title {
    font-size: 0.65rem; text-transform: uppercase;
    letter-spacing: 0.08em; color: #888; font-weight: 600;
    margin-bottom: 0.5rem;
  }
  .debug-row {
    display: flex; justify-content: space-between; gap: 0.5rem;
    padding: 0.18rem 0;
    border-bottom: 1px dashed rgba(255,255,255,0.05);
  }
  .debug-row:last-child { border-bottom: none; }
  .debug-key { color: #888; font-family: ui-monospace, "SF Mono", Menlo, monospace; }
  .debug-val {
    color: #fff; font-family: ui-monospace, "SF Mono", Menlo, monospace;
    text-align: right; word-break: break-all; max-width: 60%;
  }
  .footer { margin-top: 1.5rem; font-size: 0.8rem; color: #666; }
  .footer a { color: #b0b0b0; text-decoration: none; }
</style>
</head>
<body>
<main class="card">
  <div class="app-icon" aria-hidden="true"></div>
  <h1>You're invited to Lenix</h1>
  <button class="cta" id="cta">Get Lenix</button>
  <p class="status" id="status">&nbsp;</p>
  <div class="debug" id="debug">
    <div class="debug-title">Sent to /clicks</div>
    <div id="debugRows"></div>
  </div>
  <p class="footer"><a href="https://lenixapp.com/">lenixapp.com</a></p>
</main>

<script type="module">
  import { initializeApp }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
  import { getDatabase, ref, push, set }
    from "https://www.gstatic.com/firebasejs/10.13.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCAz-_xs6DNg1oRtHceQM8P7dVrJ2JcFQk",
    authDomain: "lenix-search.firebaseapp.com",
    databaseURL: "https://lenix-search-default-rtdb.firebaseio.com",
    projectId: "lenix-search",
    storageBucket: "lenix-search.firebasestorage.app",
    messagingSenderId: "463731369383",
    appId: "1:463731369383:ios:93f76ab4e2e697f1644282"
  };
  const fapp = initializeApp(firebaseConfig);
  const db = getDatabase(fapp);

  const APP_STORE_URL = "https://apps.apple.com/us/app/lenix/id6753905127";

  // Referrer from URL: /referral/USER_X or ?ref=USER_X
  const params = new URLSearchParams(location.search);
  let referrerID = (params.get("ref") || "").trim();
  if (!referrerID) {
    const m = location.pathname.match(/^\/referral\/([^/]+)\/?$/);
    if (m) referrerID = decodeURIComponent(m[1]).trim();
  }

  // ─────────────────────────────────────────────────────────────
  // Pipe-delimited schema for /clicks (positions 0–32):
  //   0  ref     1  ip       2  l       3  pr     4  sh      5  sw
  //   6  tz      7  t        8  ua      9  plat   10 hw      11 mem
  //   12 tch    13 net      14 dwn     15 rtt     16 vw      17 vh
  //   18 aw     19 ah       20 cd      21 ori     22 tof     23 scm
  //   24 mot    25 src      26 ls      27 ck      28 dnt     29 webgl
  //   30 cnv    31 bat      32 chg
  // Long strings (ua, src, webgl) have "|" replaced with space.
  // ─────────────────────────────────────────────────────────────

  const safe = v => (v == null ? "" : String(v)).replace(/\|/g, " ");

  async function fetchIP() {
    try {
      const r = await fetch("https://api.ipify.org?format=json", { cache: "no-store" });
      const j = await r.json();
      return j.ip || "";
    } catch { return ""; }
  }

  function canvasFP() {
    try {
      const c = document.createElement("canvas");
      c.width = 240; c.height = 60;
      const ctx = c.getContext("2d");
      ctx.textBaseline = "alphabetic";
      ctx.fillStyle = "#f60";
      ctx.fillRect(125, 1, 62, 20);
      ctx.fillStyle = "#069";
      ctx.font = "11pt Arial";
      ctx.fillText("Lenix " + String.fromCharCode(0x1F600), 2, 15);
      ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
      ctx.font = "18pt Arial";
      ctx.fillText("Lenix " + String.fromCharCode(0x1F600), 4, 45);
      // Hash the dataURL into a short string
      const s = c.toDataURL();
      let h = 0;
      for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
      return Math.abs(h).toString(36);
    } catch { return ""; }
  }

  function webglRenderer() {
    try {
      const c = document.createElement("canvas");
      const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
      if (!gl) return "";
      const ext = gl.getExtension("WEBGL_debug_renderer_info");
      const r = ext
        ? gl.getParameter(ext.UNMASKED_RENDERER_WEBGL)
        : gl.getParameter(gl.RENDERER);
      return r || "";
    } catch { return ""; }
  }

  async function getBattery() {
    try {
      if (!navigator.getBattery) return { level: "", charging: "" };
      const b = await navigator.getBattery();
      return { level: b.level, charging: b.charging ? 1 : 0 };
    } catch { return { level: "", charging: "" }; }
  }

  function storageAvail(type) {
    try {
      const k = "__test__";
      window[type].setItem(k, "1");
      window[type].removeItem(k);
      return 1;
    } catch { return 0; }
  }

  function mediaPref(query) {
    try {
      if (!window.matchMedia) return "";
      if (window.matchMedia("(prefers-color-scheme: dark)").matches && query === "scheme") return "dark";
      if (query === "scheme") return "light";
      if (window.matchMedia("(prefers-reduced-motion: reduce)").matches && query === "motion") return "reduce";
      if (query === "motion") return "no-preference";
    } catch {}
    return "";
  }

  async function buildClickString() {
    const ip = await fetchIP();
    const battery = await getBattery();
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection || {};
    const screenOri = (window.screen.orientation && window.screen.orientation.type) || "";

    const fields = [
      referrerID || "",                                                 // 0  ref
      ip,                                                               // 1  ip
      navigator.language || "",                                         // 2  l
      window.devicePixelRatio || 1,                                     // 3  pr
      window.screen.height,                                             // 4  sh
      window.screen.width,                                              // 5  sw
      (Intl.DateTimeFormat().resolvedOptions().timeZone) || "",         // 6  tz
      Date.now(),                                                       // 7  t
      safe(navigator.userAgent),                                        // 8  ua
      navigator.platform || "",                                         // 9  plat
      navigator.hardwareConcurrency ?? "",                              // 10 hw
      navigator.deviceMemory ?? "",                                     // 11 mem
      navigator.maxTouchPoints ?? "",                                   // 12 tch
      conn.effectiveType || "",                                         // 13 net
      conn.downlink ?? "",                                              // 14 dwn
      conn.rtt ?? "",                                                   // 15 rtt
      window.innerWidth,                                                // 16 vw
      window.innerHeight,                                               // 17 vh
      window.screen.availWidth,                                         // 18 aw
      window.screen.availHeight,                                        // 19 ah
      window.screen.colorDepth,                                         // 20 cd
      screenOri,                                                        // 21 ori
      new Date().getTimezoneOffset(),                                   // 22 tof  (minutes)
      mediaPref("scheme"),                                              // 23 scm
      mediaPref("motion"),                                              // 24 mot
      safe(document.referrer || ""),                                    // 25 src
      storageAvail("localStorage"),                                     // 26 ls
      navigator.cookieEnabled ? 1 : 0,                                  // 27 ck
      navigator.doNotTrack || "",                                       // 28 dnt
      safe(webglRenderer()),                                            // 29 webgl
      canvasFP(),                                                       // 30 cnv
      battery.level,                                                    // 31 bat
      battery.charging                                                  // 32 chg
    ];

    return fields.map(v => v == null ? "" : String(v)).join("|");
  }

  const LABELS = [
    "ref","ip","l","pr","sh","sw","tz","t",
    "ua","plat","hw","mem","tch","net","dwn","rtt",
    "vw","vh","aw","ah","cd","ori","tof","scm",
    "mot","src","ls","ck","dnt","webgl","cnv","bat","chg"
  ];

  function renderDebug(s) {
    const parts = s.split("|");
    const debugEl = document.getElementById("debug");
    const rows = document.getElementById("debugRows");
    rows.innerHTML = LABELS.map((k, i) => `
      <div class="debug-row">
        <span class="debug-key">${k}</span>
        <span class="debug-val">${esc(parts[i] ?? "")}</span>
      </div>`).join("");
    debugEl.classList.add("show");
  }
  function esc(s) {
    return String(s ?? "").replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  document.getElementById("cta").addEventListener("click", async () => {
    const cta = document.getElementById("cta");
    const status = document.getElementById("status");
    cta.disabled = true;
    status.textContent = "Saving…";

    const s = await buildClickString();
    try {
      const newRef = push(ref(db, "clicks"));
      await set(newRef, s);
      renderDebug(s);
      status.textContent = "Opening the App Store…";
    } catch {
      status.textContent = "Opening the App Store…";
    }
    setTimeout(() => { window.location.href = APP_STORE_URL; }, 600);
  });
</script>
</body>
</html>
